name: cleanit
description: Free hostel room cleaning app for college students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # ── Supabase ──
  supabase_flutter: ^2.3.0

  # ── Firebase / FCM ──
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0

  # ── QR Code ──
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.0

  # ── Camera & Image ──
  image_picker: ^1.0.7

  # ── Crypto (HMAC for QR signing) ──
  crypto: ^3.0.3

  # ── HTTP ──
  http: ^1.2.0

  # ── Utilities ──
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
